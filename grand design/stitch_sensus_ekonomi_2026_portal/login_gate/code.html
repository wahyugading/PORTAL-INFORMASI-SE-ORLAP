<!-- Micro-interaction Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const loginBtn = document.querySelector('.btn-interact');
            
            loginBtn.addEventListener('click', (e) => {
                // Simulate a subtle loading state
                const originalContent = loginBtn.innerHTML;
                loginBtn.style.opacity = '0.7';
                loginBtn.innerHTML = `
                    <div class="animate-spin rounded-full h-5 w-5 border-2 border-slate-950 border-t-transparent"></div>
                    <span>Verifying...</span>
                `;
                
                setTimeout(() => {
                    loginBtn.innerHTML = originalContent;
                    loginBtn.style.opacity = '1';
                }, 1500);
            });
        });
    </script>
