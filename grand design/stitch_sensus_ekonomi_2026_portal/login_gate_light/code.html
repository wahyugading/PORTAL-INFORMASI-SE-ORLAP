<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        display: inline-block;
        vertical-align: middle;
      }
      
      body {
        background-color: #FFFFFF; /* Pure White override as requested */
        overscroll-behavior: none;
      }

      .btn-depress:active {
        transform: scale(0.98);
        filter: brightness(0.9);
      }

      /* Subtle entry animation */
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-up {
        animation: fadeUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
      }

<style>
    body {

<body class="flex flex-col min-h-screen items-center justify-center font-body-md text-on-surface">

</div>
</div>
<!-- Heading Section -->

<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-text-solid mb-stack-sm tracking-tight">
                Akses Terbatas Internal
            </h1>
<p class="font-body-md text-body-md text-secondary max-w-[320px] mx-auto">
                Masuk dengan email institusi @stis.ac.id Anda.
            </p>
</header>
<!-- Action Section (Thumb-Zone prioritized bottom-middle) -->
<div class="w-full space-y-gutter">
<!-- Google Sign-in Button: BPS Orange Box -->
<button class="btn-depress w-full h-touch-target bg-primary-container text-on-primary font-label-lg text-label-lg rounded-xl flex items-center justify-center gap-3 transition-all shadow-sm">
<svg class="w-5 h-5 fill-current" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#FFFFFF"></path>

<!-- Secondary Help Action -->
<button class="w-full text-center py-2 font-label-md text-label-md text-outline hover:text-primary transition-colors">
                Butuh Bantuan Akses?
            </button>
</div>
<!-- Security Badge/Indicator -->
<div class="mt-stack-lg flex items-center gap-2 px-4 py-2 rounded-full bg-surface-container-low border border-on-surface/5">
<span class="material-symbols-outlined text-[18px] text-tertiary">verified_user</span>
<span class="text-[11px] font-bold tracking-widest text-on-surface-variant uppercase">Encrypted Session</span>

<p class="font-label-md text-label-md text-[#94A3B8] tracking-[0.2em] uppercase">

        </p>
</footer>
<!-- Interactive Layer: Lightweight Atmospheric Effects -->
<div class="fixed inset-0 pointer-events-none z-[-1] opacity-20">
<div class="absolute top-[-10%] right-[-10%] w-[400px] h-[400px] bg-primary-container/10 rounded-full blur-[100px]"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-[300px] h-[300px] bg-institutional-blue/5 rounded-full blur-[80px]"></div>
</div>
<script>
        // Simple Interaction Feedback for the Primary Button
        const loginBtn = document.querySelector('button');
        loginBtn.addEventListener('mousedown', () => {
            loginBtn.classList.add('scale-95');
        });
        loginBtn.addEventListener('mouseup', () => {
            loginBtn.classList.remove('scale-95');
        });
        loginBtn.addEventListener('mouseleave', () => {
            loginBtn.classList.remove('scale-95');
        });

        // Prevention of accidental drag on logo
        document.querySelector('img').addEventListener('dragstart', (e) => e.preventDefault());
    </script>
